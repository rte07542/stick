<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>stick | 로그인</title>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/index.css" />
</head>
<body>

<div class="home">
    <main class="homeCard" role="main">
        <header class="homeHead">
            <h1 class="homeTitle"><img alt="stick" class="stickLogo" src="img/stick.svg"></h1>
        </header>

        <section class="homeBody">
            <label class="loginLabel">
                아이디
                <input id="loginId" class="loginInput input" type="text" autocomplete="username" />
            </label>

            <label class="loginLabel">
                비밀번호
                <input id="loginPw" class="loginInput input" type="password" autocomplete="current-password" />
            </label>
        </section>

        <section class="homeActions">
            <button id="loginSubmitBtn" class="btn primary" type="button">로그인</button>
        </section>

        <footer class="homeFoot">
            <p class="homeHint">
                아직 계정이 없으신가요?
                <a href="html/signup.html" class="loginLink">회원가입</a>
            </p>
        </footer>

    </main>
</div>

<script src="js/index.js"></script>

</body>
</html>
